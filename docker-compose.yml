version: "3.9"

services:
  frontend:
    image: react-frontend-prod
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "6000:80"
    restart: unless-stopped

  backend:
    image: node-backend-prod
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: backend
    env_file:
      - backend/.env
    ports:
      - "6001:8080"
    restart: unless-stopped
    
  database:
    image: postgres:16
    container_name: roulette-db
    env_file:
      - backend/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db-init.sql:/docker-entrypoint-initdb.d/db-init.sql:ro
    restart: unless-stopped

volumes:
  pgdata:
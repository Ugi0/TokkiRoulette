version: "3.9"

services:
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      target: dev
    container_name: frontend-dev
    ports:
      - "80:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: unever


  backend:
    build:
      context: backend
      target: dev
    container_name: backend-dev
    env_file:
      - backend/.env
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: unever

  database:
    image: postgres:16
    container_name: roulette-db
    env_file:
      - backend/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db-init.sql:/docker-entrypoint-initdb.d/db-init.sql:ro
    restart: never

volumes:
  pgdata: